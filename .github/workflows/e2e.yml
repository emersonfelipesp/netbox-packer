name: e2e

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      netbox_image:
        description: "NetBox Docker image to test against"
        required: false
        type: string
        default: "netboxcommunity/netbox:v4.6.3"

permissions:
  contents: read

jobs:
  e2e-docker:
    name: NetBox plugin install + smoke / ${{ matrix.netbox_image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        netbox_image:
          - netboxcommunity/netbox:v4.5.8
          - netboxcommunity/netbox:v4.5.9
          - netboxcommunity/netbox:v4.6.0
          - netboxcommunity/netbox:v4.6.1
          - netboxcommunity/netbox:v4.6.2
          - netboxcommunity/netbox:v4.6.3
    env:
      NETBOX_IMAGE: ${{ inputs.netbox_image || matrix.netbox_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
          ls -la dist/

      - name: Smoke-install plugin into NetBox image
        run: |
          set -eux
          docker pull "$NETBOX_IMAGE"
          docker run --rm \
            -v "$PWD/dist:/dist:ro" \
            "$NETBOX_IMAGE" \
            sh -c '
              uv pip install --python /opt/netbox/venv/bin/python --no-deps /dist/*.whl &&
              /opt/netbox/venv/bin/python -c "import netbox_packer; print(netbox_packer.__name__)"
            '

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: netbox-packer-wheel
          path: dist/*.whl
          if-no-files-found: error
