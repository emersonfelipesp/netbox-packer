name: Docs Screenshots

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NETBOX_IMAGE: netboxcommunity/netbox:v4.6.3
  SECRET_KEY: netbox-packer-e2e-secret-key-netbox-packer-e2e-secret-key-netbox-packer-e2e

jobs:
  capture-screenshots:
    name: Capture UI Screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/') && 'main' || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[screenshot]"
          playwright install chromium --with-deps

      - name: Start E2E stack
        run: |
          set -eux
          docker network create netbox-packer-e2e || true

          docker rm -f netbox-e2e-postgres netbox-e2e-redis netbox-e2e 2>/dev/null || true

          docker run -d --name netbox-e2e-postgres --network netbox-packer-e2e \
            -e POSTGRES_DB=netbox \
            -e POSTGRES_USER=netbox \
            -e POSTGRES_PASSWORD=netbox \
            --health-cmd="pg_isready -U netbox -d netbox" \
            --health-interval=2s \
            --health-timeout=2s \
            --health-retries=30 \
            postgres:16-alpine

          docker run -d --name netbox-e2e-redis --network netbox-packer-e2e \
            redis:7-alpine

          for i in $(seq 1 60); do
            health="$(docker inspect --format '{{.State.Health.Status}}' netbox-e2e-postgres 2>/dev/null || echo unknown)"
            [ "$health" = "healthy" ] && break
            sleep 1
            [ "$i" -eq 60 ] && { echo "postgres did not become healthy"; docker logs netbox-e2e-postgres; exit 1; }
          done

          docker pull "${NETBOX_IMAGE}"

          docker run -d --name netbox-e2e --network netbox-packer-e2e -p "18080:8080" \
            -v "$PWD:/tmp/netbox-packer:ro" \
            -e DB_HOST=netbox-e2e-postgres \
            -e DB_NAME=netbox \
            -e DB_USER=netbox \
            -e DB_PASSWORD=netbox \
            -e REDIS_HOST=netbox-e2e-redis \
            -e REDIS_DATABASE=0 \
            -e REDIS_CACHE_HOST=netbox-e2e-redis \
            -e REDIS_CACHE_DATABASE=1 \
            -e REDIS_TASK_HOST=netbox-e2e-redis \
            -e REDIS_TASK_DATABASE=2 \
            -e SECRET_KEY="$SECRET_KEY" \
            -e SUPERUSER_NAME=admin \
            -e SUPERUSER_EMAIL=admin@example.com \
            -e SUPERUSER_PASSWORD=admin \
            -e ALLOWED_HOSTS="* localhost 127.0.0.1 ::1 netbox" \
            -e LOGIN_REQUIRED=True \
            --entrypoint /bin/bash \
            "${NETBOX_IMAGE}" -ec \
              "uv pip install --upgrade /tmp/netbox-packer && mkdir -p /etc/netbox/config && printf 'PLUGINS = [\"netbox_packer\"]\n' > /etc/netbox/config/plugins.py && /opt/netbox/docker-entrypoint.sh /opt/netbox/launch-netbox.sh"

      - name: Wait for NetBox readiness and create API token
        run: |
          set -eux
          for i in $(seq 1 240); do
            http_code="$(curl -sS --max-time 5 -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/api/ 2>/dev/null || true)"
            if [ "$http_code" -ge 100 ] 2>/dev/null && [ "$http_code" -lt 500 ]; then break; fi
            sleep 2
            [ "$i" -eq 240 ] && { echo "NetBox did not become ready"; docker logs netbox-e2e; exit 1; }
          done
          TOKEN_OUTPUT=$(docker exec netbox-e2e /opt/netbox/venv/bin/python /opt/netbox/netbox/manage.py shell -c \
            "from users.models import Token, User; u=User.objects.get(username='admin'); t=Token.objects.create(user=u, version=1, token='aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'); print(f'{t.id}:{t.plaintext}')")
          TOKEN_VALUE=$(printf '%s' "$TOKEN_OUTPUT" | tail -n 1 | cut -d: -f2)
          echo "NETBOX_API_TOKEN=$TOKEN_VALUE" >> "$GITHUB_ENV"

      - name: Capture screenshots
        env:
          NETBOX_BASE_URL: http://127.0.0.1:18080
          NETBOX_API_TOKEN: ${{ env.NETBOX_API_TOKEN }}
          SCREENSHOTS_DIR: docs/assets/screenshots
        run: |
          mkdir -p docs/assets/screenshots
          python scripts/capture_screenshots.py

      - name: Commit and push screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/screenshots/
          if git diff --staged --quiet; then
            echo "No screenshot changes to commit."
            exit 0
          fi
          git commit -m "chore: update UI screenshots [skip ci]"
          git pull --rebase origin main
          git push

      - name: Install documentation dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build and deploy docs
        run: |
          mkdocs build --strict
          ghp-import -n -p -f -m "Deploy docs with updated screenshots [${GITHUB_SHA}]" site

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "=== NetBox logs ==="
          docker logs netbox-e2e 2>&1 | tail -100 || true
