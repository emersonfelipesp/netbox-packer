name: CI

on:
  push:
    branches:
      - main
      - v0.0.2
  pull_request:
    branches:
      - main
      - v0.0.2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & format ─────────────────────────────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check for lint errors
        run: ruff check netbox_packer/

      - name: Check code formatting
        run: ruff format --check netbox_packer/

  # ── Static tests ──────────────────────────────────────────────────────────
  static-tests:
    name: Static tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest and test dependencies
        run: pip install pytest requests

      - name: Run static tests
        run: pytest tests/ -v

  package:
    name: Package metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and validate package metadata
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

  # ── NetBox integration tests ──────────────────────────────────────────────
  test:
    name: Test (NetBox v4.6.1 source)
    runs-on: ubuntu-latest
    needs: [lint, static-tests, package]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: netbox
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Run NetBox v4.6.1 source test suite
        env:
          NETBOX_REF: v4.6.1
          NETBOX_PLUGINS_JSON: '["netbox_packer"]'
          MIGRATION_APPS: "netbox_packer"
          TEST_LABELS: "netbox_packer"
          DB_HOST: localhost
          DB_NAME: netbox
          DB_USER: netbox
          DB_PASSWORD: netbox
          REDIS_HOST: localhost
        run: bash .github/ci/netbox46-source-test.sh
